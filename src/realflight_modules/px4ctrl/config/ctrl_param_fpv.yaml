#########################################################################
# ⭐⭐⭐  Set parameters carefully for satisfied performance!   ⭐⭐⭐ #
#########################################################################

ctrl_freq_max   : 30.0

rc_reverse: # *
    roll: false
    pitch: true
    yaw: false
    throttle: true

auto_takeoff_land:
    takeoff_height: 1.2 # m
    takeoff_land_speed: 0.7 # m/s

gain: 
    # Cascade PID controller. Recommend to read the code.
    Kp0: 1.5
    Kp1: 1.5 
    Kp2: 1.5
    Kv0: 1.5
    Kv1: 1.5
    Kv2: 1.5
    # ↓↓↓ No use now --
    Kvi0: 0.2
    Kvi1: 0.2
    Kvi2: 0.0
    Kvd0: 0.0
    Kvd1: 0.0
    Kvd2: 0.0
    Ka0: 1.0
    Ka1: 1.0
    Ka2: 1.0
    Kyaw: 0.0
    # ↓↓↓ Only used in rate control mode.
    KAngR: 20.0
    KAngP: 20.0
    KAngY: 20.0

msg_timeout:
    odom: 0.5
    rc:   0.5
    cmd:  0.5
    imu:  0.5
    bat:  0.5
